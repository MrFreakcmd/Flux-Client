name: Build and publish Flux images

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Normalize GHCR owner
        id: ghcr_owner
        shell: bash
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.ghcr_owner.outputs.owner_lc }}/flux-client-backend:latest
            ${{ env.REGISTRY }}/${{ steps.ghcr_owner.outputs.owner_lc }}/flux-client-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Normalize GHCR owner
        id: ghcr_owner
        shell: bash
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.ghcr_owner.outputs.owner_lc }}/flux-client-frontend:latest
            ${{ env.REGISTRY }}/${{ steps.ghcr_owner.outputs.owner_lc }}/flux-client-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: true

      - name: Verify bundle contains expected routes
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.ghcr_owner.outputs.owner_lc }}/flux-client-frontend:latest"
          docker run --rm "$IMAGE" sh -c "grep -rq 'admin/settings' /usr/share/nginx/html/assets/" || (echo "ERROR: admin/settings route not found in compiled bundle" && exit 1)
          echo "✓ Bundle verification passed: admin/settings route found"
