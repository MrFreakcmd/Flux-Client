services:
  db:
    image: postgres:16-alpine
    container_name: flux_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-flux_client}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-flux_client}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flux_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/blackbox-cmd/flux-client-backend:${FLUX_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: flux_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${FLUX_BACKEND_PORT:-8010}:8000"
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-flux_client}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - CALAGOPUS_URL=${CALAGOPUS_URL}
      - CALAGOPUS_API_KEY=${CALAGOPUS_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3010}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://localhost:8010}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI}
      - SECRET_KEY=${SECRET_KEY}
      - VPNAPI_KEY=${VPNAPI_KEY}
      - SSLCOMMERZ_STORE_ID=${SSLCOMMERZ_STORE_ID}
      - SSLCOMMERZ_STORE_PASSWORD=${SSLCOMMERZ_STORE_PASSWORD}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}

  frontend:
    image: ghcr.io/blackbox-cmd/flux-client-frontend:${FLUX_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: flux_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FLUX_FRONTEND_PORT:-3010}:80"

volumes:
  postgres_data:
  redis_data:
